<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0c;
  --surface: #111114;
  --card: #16161a;
  --border: #1e1e24;
  --border2: #2a2a33;
  --text: #e2e2ea;
  --muted: #55555f;
  --muted2: #888895;
  --anime: #f97316;
  --film: #38bdf8;
  --serie: #c084fc;
  --manga: #4ade80;
}
body { background: var(--bg); color: var(--text); font-family: 'Instrument Sans', sans-serif; min-height: 100vh; }
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.6;
}
.wrapper { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 50px 24px 80px; }

header { margin-bottom: 44px; }
.header-top { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 20px; margin-bottom: 24px; }
h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.8rem, 7vw, 6rem); font-weight: 800; line-height: 0.88; letter-spacing: -0.02em; }
h1 .sub { display: block; font-size: 0.19em; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; color: var(--muted2); font-family: 'Instrument Sans', sans-serif; margin-bottom: 8px; }
.stats-bar { display: flex; gap: 20px; flex-wrap: wrap; }
.stat { text-align: right; }
.stat-num { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; line-height: 1; }
.stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-top: 2px; }
.progress-wrap { margin-bottom: 28px; }
.progress-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 7px; }
.progress-track { height: 2px; background: var(--border2); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--anime) 0%, var(--film) 40%, var(--serie) 70%, var(--manga) 100%); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

.controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
.cat-tabs { display: flex; gap: 5px; flex-wrap: wrap; }
.cat-tab { padding: 7px 15px; border-radius: 100px; border: 1px solid var(--border2); background: none; color: var(--muted2); cursor: pointer; font-family: 'Instrument Sans', sans-serif; font-size: 0.76rem; letter-spacing: 0.04em; transition: all 0.15s; white-space: nowrap; }
.cat-tab:hover { color: var(--text); border-color: #444; }
.cat-tab.active { color: #000; font-weight: 500; }
.cat-tab.active[data-cat="all"]  { background: var(--text); border-color: var(--text); }
.cat-tab.active[data-cat="anime"] { background: var(--anime); border-color: var(--anime); }
.cat-tab.active[data-cat="film"]  { background: var(--film);  border-color: var(--film); }
.cat-tab.active[data-cat="serie"] { background: var(--serie); border-color: var(--serie); }
.cat-tab.active[data-cat="manga"] { background: var(--manga); border-color: var(--manga); }
.spacer { flex: 1; min-width: 10px; }
.search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.35; pointer-events: none; }
#search { width: 100%; padding: 7px 11px 7px 32px; border-radius: 100px; border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-family: 'Instrument Sans', sans-serif; font-size: 0.76rem; outline: none; transition: border-color 0.15s; }
#search:focus { border-color: #555; }
#search::placeholder { color: var(--muted); }
.btn-filter { display: flex; align-items: center; gap: 6px; padding: 7px 15px; border-radius: 100px; border: 1px solid var(--border2); background: none; color: var(--text); cursor: pointer; font-family: 'Instrument Sans', sans-serif; font-size: 0.76rem; transition: all 0.15s; white-space: nowrap; }
.btn-filter:hover { background: var(--surface); border-color: #555; }
.btn-filter.open { background: var(--surface); border-color: #555; }
.filter-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--anime); display: none; }
.filter-dot.on { display: block; }

.filter-panel { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 20px 22px; margin-bottom: 12px; display: none; gap: 20px; flex-wrap: wrap; }
.filter-panel.open { display: flex; }
.fg-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 9px; }
.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip { padding: 3px 10px; border-radius: 100px; border: 1px solid var(--border2); background: none; color: var(--muted2); cursor: pointer; font-family: 'Instrument Sans', sans-serif; font-size: 0.72rem; transition: all 0.12s; }
.chip:hover { color: var(--text); border-color: #555; }
.chip.on { background: var(--text); color: #000; border-color: var(--text); font-weight: 500; }
.sort-row { display: flex; flex-wrap: wrap; gap: 5px; }
.sort-btn { padding: 5px 11px; border-radius: 8px; border: 1px solid var(--border2); background: none; color: var(--muted2); cursor: pointer; font-family: 'Instrument Sans', sans-serif; font-size: 0.72rem; transition: all 0.12s; }
.sort-btn:hover { color: var(--text); }
.sort-btn.on { background: var(--card); color: var(--text); border-color: #555; }
.fp-footer { width: 100%; display: flex; justify-content: flex-end; padding-top: 10px; border-top: 1px solid var(--border); }
.btn-clear { padding: 5px 13px; border-radius: 8px; border: 1px solid var(--border2); background: none; color: var(--muted2); cursor: pointer; font-family: 'Instrument Sans', sans-serif; font-size: 0.72rem; transition: all 0.12s; }
.btn-clear:hover { color: var(--text); }

.bottom-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.results-info { font-size: 0.73rem; color: var(--muted); letter-spacing: 0.04em; }
.results-info strong { color: var(--text); }
.show-tabs { display: flex; gap: 5px; }
.show-btn { padding: 6px 13px; border-radius: 100px; border: 1px solid var(--border2); background: none; color: var(--muted2); cursor: pointer; font-family: 'Instrument Sans', sans-serif; font-size: 0.73rem; transition: all 0.15s; white-space: nowrap; }
.show-btn:hover { color: var(--text); }
.show-btn.on { background: var(--surface); color: var(--text); border-color: #555; }

.section { margin-bottom: 44px; }
.sec-header { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; padding-bottom: 11px; border-bottom: 1px solid var(--border); }
.sec-line { width: 3px; height: 17px; border-radius: 99px; flex-shrink: 0; }
.sec-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.02em; }
.sec-count { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; margin-left: auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(235px, 1fr)); gap: 7px; }

.item { background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 11px 13px; display: flex; align-items: flex-start; gap: 9px; cursor: pointer; transition: transform 0.13s, border-color 0.13s, background 0.18s, opacity 0.18s; user-select: none; }
.item:hover { transform: translateY(-1px); }
.item.ta:hover { border-color: rgba(249,115,22,.4); }
.item.tf:hover { border-color: rgba(56,189,248,.4); }
.item.ts:hover { border-color: rgba(192,132,252,.4); }
.item.tm:hover { border-color: rgba(74,222,128,.4); }
.item.done { background: #0d1a10; border-color: #1a3320; opacity: 0.6; }
.item.done:hover { opacity: 0.82; }
.chk { width: 17px; height: 17px; border-radius: 5px; border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.13s; }
.item.done .chk { background: #2a6640; border-color: #3a8050; }
.item.done .chk::after { content: '✓'; font-size: 9px; color: #4ade80; font-weight: 700; }
.em { font-size: 1.25rem; flex-shrink: 0; width: 24px; text-align: center; line-height: 1.2; }
.ib { flex: 1; min-width: 0; }
.iname { font-size: 0.81rem; line-height: 1.35; color: var(--text); }
.item.done .iname { text-decoration: line-through; color: var(--muted2); }
.imeta { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; align-items: center; }
.iyear { font-size: 0.66rem; color: var(--muted); }
.igenre { font-size: 0.6rem; padding: 1px 6px; border-radius: 4px; background: var(--border2); color: var(--muted2); letter-spacing: 0.03em; }
.empty { padding: 48px 24px; text-align: center; color: var(--muted); font-size: 0.88rem; }
.empty-icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.35; }
@keyframes fi { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.item { animation: fi 0.2s ease both; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
</style>
</head>

<div class="wrapper">
<header>

    <h1><span class="sub">Ma Collection</span>WATCH<br>LIST</h1>
    <div class="stats-bar">

      <div class="stat"><div class="stat-num" id="stwatched" style="color:var(--manga)">—</div><div class="stat-label">Vus / Lus</div></div>
      <div class="stat"><div class="stat-num" id="stleft" style="color:var(--muted2)">—</div><div class="stat-label">Restants</div></div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span>Progression</span><span id="ppct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
  </div>
</header>

<div class="controls">
  <div class="cat-tabs">
    <button class="cat-tab active" data-cat="all">Tout</button>
    <button class="cat-tab" data-cat="anime">🎌 Animés</button>
    <button class="cat-tab" data-cat="film">🎬 Films</button>
    <button class="cat-tab" data-cat="serie">📺 Séries</button>
    <button class="cat-tab" data-cat="manga">📚 Mangas</button>
  </div>
  <div class="spacer"></div>
  <div class="search-wrap">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Rechercher...">
  </div>
  <button class="btn-filter" id="btnf">
    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
    Filtres &amp; Tri
    <span class="filter-dot" id="fdot"></span>
  </button>
</div>

<div class="filter-panel" id="fpanel">
  <div style="flex-basis:100%">
    <div class="fg-title">Trier par</div>
    <div class="sort-row">
      <button class="sort-btn on" data-sort="default">Par défaut</button>
      <button class="sort-btn" data-sort="alpha-asc">A → Z</button>
      <button class="sort-btn" data-sort="alpha-desc">Z → A</button>
      <button class="sort-btn" data-sort="year-asc">Année ↑</button>
      <button class="sort-btn" data-sort="year-desc">Année ↓</button>
      <button class="sort-btn" data-sort="unwatched">Non vus d'abord</button>
      <button class="sort-btn" data-sort="watched-first">Vus d'abord</button>
    </div>
  </div>
  <div style="flex:2; min-width:200px">
    <div class="fg-title">Genre</div>
    <div class="chips" id="gchips"></div>
  </div>
  <div style="flex:1; min-width:140px">
    <div class="fg-title">Statut</div>
    <div class="chips">
      <button class="chip" data-status="unwatched">🔲 À voir</button>
      <button class="chip" data-status="watched">✅ Vus / Lus</button>
    </div>
  </div>
  <div style="flex:1; min-width:140px">
    <div class="fg-title">Décennie</div>
    <div class="chips" id="dchips"></div>
  </div>
  <div class="fp-footer"><button class="btn-clear" id="bclr">Réinitialiser</button></div>
</div>

<div class="bottom-bar">
  <div class="results-info" id="rinfo"></div>
  <div class="show-tabs">
    <button class="show-btn on" data-show="all">Tout</button>
    <button class="show-btn" data-show="unwatched">À voir</button>
    <button class="show-btn" data-show="watched">Vus / Lus</button>
  </div>
</div>

<div id="scontainer"></div>
</div>

const TYPE_META = {
  'anime':     {label:'🎌 ANIMÉS',        cls:'ta', accent:'var(--anime)'},
  'anime-film':{label:'🎥 FILMS D\'ANIMÉ', cls:'ta', accent:'var(--anime)'},
  'film':      {label:'🎬 FILMS',          cls:'tf', accent:'var(--film)'},
  'serie':     {label:'📺 SÉRIES',         cls:'ts', accent:'var(--serie)'},
  'manga':     {label:'📚 MANGAS À LIRE',  cls:'tm', accent:'var(--manga)'},
};
const TYPE_ORDER = ['anime','anime-film','film','serie','manga'];

let W = new Set(JSON.parse(localStorage.getItem('wl_watched')||'[]'));
function save(){ localStorage.setItem('wl_watched', JSON.stringify([...W])); }

let S = { cat:'all', genres:new Set(), status:null, decades:new Set(), sort:'default', show:'all', q:'' };

// Build genre/decade chips
const allGenres = [...new Set(DATA.flatMap(i=>i.genres))].sort();
const allDecades = [...new Set(DATA.filter(i=>i.year).map(i=>Math.floor(i.year/10)*10))].sort();

document.getElementById('gchips').innerHTML = allGenres.map(g=>`<button class="chip" data-g="${g}">${g}</button>`).join('');
document.getElementById('dchips').innerHTML = allDecades.map(d=>`<button class="chip" data-d="${d}">${d}s</button>`).join('');

document.getElementById('gchips').addEventListener('click',e=>{
  const b=e.target.closest('[data-g]'); if(!b)return;
  const g=b.dataset.g;
  S.genres.has(g)?S.genres.delete(g):S.genres.add(g);
  b.classList.toggle('on'); dot(); go();
});
document.getElementById('dchips').addEventListener('click',e=>{
  const b=e.target.closest('[data-d]'); if(!b)return;
  const d=parseInt(b.dataset.d);
  S.decades.has(d)?S.decades.delete(d):S.decades.add(d);
  b.classList.toggle('on'); dot(); go();
});
document.querySelectorAll('[data-status]').forEach(b=>{
  b.addEventListener('click',()=>{
    const s=b.dataset.status;
    if(S.status===s){S.status=null;b.classList.remove('on');}
    else{document.querySelectorAll('[data-status]').forEach(x=>x.classList.remove('on'));S.status=s;b.classList.add('on');}
    dot(); go();
  });
});
document.querySelectorAll('[data-sort]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-sort]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); S.sort=b.dataset.sort; dot(); go();
  });
});
document.querySelectorAll('.cat-tab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.cat-tab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); S.cat=b.dataset.cat; go();
  });
});
document.querySelectorAll('.show-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.show-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); S.show=b.dataset.show; go();
  });
});
document.getElementById('search').addEventListener('input',e=>{S.q=e.target.value; go();});
document.getElementById('btnf').addEventListener('click',()=>{
  document.getElementById('fpanel').classList.toggle('open');
  document.getElementById('btnf').classList.toggle('open');
});
document.getElementById('bclr').addEventListener('click',()=>{
  S.genres.clear(); S.decades.clear(); S.status=null; S.sort='default';
  document.querySelectorAll('.chip.on,[data-status].on').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('[data-sort]').forEach(x=>x.classList.remove('on'));
  document.querySelector('[data-sort="default"]').classList.add('on');
  dot(); go();
});

function dot(){
  const on=S.genres.size||S.decades.size||S.status!==null||S.sort!=='default';
  document.getElementById('fdot').classList.toggle('on',on);
}

function filtered(){
  let items=[...DATA];
  const q=S.q.toLowerCase().trim();
  if(S.cat!=='all'){
    if(S.cat==='anime') items=items.filter(i=>i.type==='anime'||i.type==='anime-film');
    else items=items.filter(i=>i.type===S.cat);
  }
  if(q) items=items.filter(i=>i.name.toLowerCase().includes(q));
  if(S.genres.size) items=items.filter(i=>[...S.genres].every(g=>i.genres.includes(g)));
  if(S.decades.size) items=items.filter(i=>i.year&&S.decades.has(Math.floor(i.year/10)*10));
  if(S.status==='watched') items=items.filter(i=>W.has(i.id));
  if(S.status==='unwatched') items=items.filter(i=>!W.has(i.id));
  if(S.show==='watched') items=items.filter(i=>W.has(i.id));
  if(S.show==='unwatched') items=items.filter(i=>!W.has(i.id));
  switch(S.sort){
    case 'alpha-asc':  items.sort((a,b)=>a.name.localeCompare(b.name)); break;
    case 'alpha-desc': items.sort((a,b)=>b.name.localeCompare(a.name)); break;
    case 'year-asc':   items.sort((a,b)=>(a.year||9999)-(b.year||9999)); break;
    case 'year-desc':  items.sort((a,b)=>(b.year||0)-(a.year||0)); break;
    case 'unwatched':  items.sort((a,b)=>W.has(a.id)-W.has(b.id)); break;
    case 'watched-first': items.sort((a,b)=>W.has(b.id)-W.has(a.id)); break;
  }
  return items;
}

function go(){
  const items=filtered();
  const groups={};
  TYPE_ORDER.forEach(t=>groups[t]=[]);
  items.forEach(i=>{if(groups[i.type])groups[i.type].push(i);});

  let html=''; let total=0;
  TYPE_ORDER.forEach(type=>{
    const list=groups[type]; if(!list.length)return;
    total+=list.length;
    const m=TYPE_META[type];
    html+=`<div class="section">
      <div class="sec-header">
        <span class="sec-line" style="background:${m.accent}"></span>
        <span class="sec-title">${m.label}</span>
        <span class="sec-count">${list.length} titre${list.length>1?'s':''}</span>
      </div>
      <div class="grid">
        ${list.map((it,idx)=>{
          const done=W.has(it.id);
          return `<div class="item ${m.cls} ${done?'done':''}" data-id="${it.id}" style="animation-delay:${Math.min(idx*12,180)}ms">
            <span class="chk"></span>
            <span class="em">${it.emoji}</span>
            <div class="ib">
              <div class="iname">${it.name}</div>
              <div class="imeta">
                ${it.year?`<span class="iyear">${it.year}</span>`:''}
                ${it.genres.slice(0,2).map(g=>`<span class="igenre">${g}</span>`).join('')}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div></div>`;
  });
  if(!total) html=`<div class="empty"><div class="empty-icon">🔍</div>Aucun résultat trouvé.</div>`;

  document.getElementById('scontainer').innerHTML=html;
  document.querySelectorAll('.item').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=parseInt(el.dataset.id);
      W.has(id)?W.delete(id):W.add(id);
      save(); stats(); go();
    });
  });

  const info=`<strong>${total}</strong> titre${total>1?'s':''} affiché${total>1?'s':''}`;
  document.getElementById('rinfo').innerHTML=info;
  stats();
}

function stats(){
  const t=DATA.length, w=W.size, l=t-w, p=Math.round(w/t*100);
  document.getElementById('sttotal').textContent=t;
  document.getElementById('stwatched').textContent=w;
  document.getElementById('stleft').textContent=l;
  document.getElementById('ppct').textContent=p+'%';
  document.getElementById('pfill').style.width=p+'%';
}

go();
</script>
