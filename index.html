<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f;
    --card: #141417;
    --border: #222228;
    --text: #e8e8ec;
    --muted: #666;
    --anime: #ff6b35;
    --film: #4fc3f7;
    --serie: #a78bfa;
    --manga: #4ade80;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 40px 20px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 6vw, 5rem); letter-spacing: 0.05em; text-align: center; margin-bottom: 8px; background: linear-gradient(135deg, #fff 30%, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 50px; }
  .tabs { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
  .tab { padding: 8px 20px; border-radius: 100px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; transition: all 0.2s; }
  .tab:hover { color: var(--text); border-color: #444; }
  .tab.active[data-cat="anime"] { background: var(--anime); color: #000; border-color: var(--anime); }
  .tab.active[data-cat="film"] { background: var(--film); color: #000; border-color: var(--film); }
  .tab.active[data-cat="serie"] { background: var(--serie); color: #000; border-color: var(--serie); }
  .tab.active[data-cat="manga"] { background: var(--manga); color: #000; border-color: var(--manga); }
  .tab.active[data-cat="all"] { background: #fff; color: #000; border-color: #fff; }
  .section { margin-bottom: 50px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.08em; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-anime { background: var(--anime); }
  .dot-film { background: var(--film); }
  .dot-serie { background: var(--serie); }
  .dot-manga { background: var(--manga); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: transform 0.15s, border-color 0.15s; }
  .item:hover { transform: translateY(-2px); }
  .item:hover.anime { border-color: var(--anime); }
  .item:hover.film { border-color: var(--film); }
  .item:hover.serie { border-color: var(--serie); }
  .item:hover.manga { border-color: var(--manga); }
  .emoji { font-size: 1.4rem; flex-shrink: 0; width: 28px; text-align: center; }
  .name { font-size: 0.88rem; font-weight: 400; line-height: 1.3; }
  .year { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .count { font-size: 0.85rem; color: var(--muted); font-weight: 300; margin-left: auto; }
  [data-section] { transition: opacity 0.2s; }
</style>
</head>
<body>

function render() {
  ['anime','anime-film','film','serie','manga'].forEach(cat => {
    const key = cat === 'anime-film' ? 'anime-film' : cat;
    const items = data[key] || data[cat];
    const grid = document.getElementById('grid-' + cat);
    const count = document.getElementById('count-' + cat);
    if (!grid) return;
    count.textContent = items.length + ' titres';
    grid.innerHTML = items.map(i => `
      <div class="item ${cat === 'anime-film' ? 'anime' : cat}">
        <span class="emoji">${i.emoji}</span>
        <div>
          <div class="name">${i.name}</div>
          ${i.year ? `<div class="year">${i.year}</div>` : ''}
        </div>
      </div>`).join('');
  });
}

function filter(cat) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-cat="${cat}"]`).classList.add('active');
  document.querySelectorAll('[data-section]').forEach(s => {
    const sec = s.dataset.section;
    if (cat === 'all') { s.style.display = ''; }
    else if (cat === 'anime') { s.style.display = (sec === 'anime' || sec === 'anime-film') ? '' : 'none'; }
    else { s.style.display = sec === cat ? '' : 'none'; }
  });
}
